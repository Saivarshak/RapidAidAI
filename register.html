<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RapidAid AI - Register</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
        body{background:linear-gradient(135deg,#0F9D58,#4285F4);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px}
        .card{background:#fff;max-width:760px;width:100%;padding:30px;border-radius:18px;box-shadow:0 12px 30px rgba(0,0,0,.2)}
        h1{text-align:center;color:#0F9D58;margin-bottom:6px}
        p{text-align:center;color:#666;margin-bottom:20px}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
        label{font-size:14px;font-weight:bold;display:block;margin-bottom:5px}
        input,select,textarea{width:100%;padding:11px;border:1px solid #ccc;border-radius:10px}
        textarea{grid-column:1/-1;resize:vertical}
        .full{grid-column:1/-1}
        .btn{width:100%;padding:14px;border:none;border-radius:10px;background:#0F9D58;color:#fff;font-size:16px;font-weight:bold;cursor:pointer;margin-top:18px}
        .small{text-align:center;margin-top:16px}
        a{color:#4285F4;text-decoration:none}
    </style>
</head>
<body>
    <div class="card">
        <h1>RapidAid AI</h1>
        <p>Create Your Account</p>
        <form method="post">
            {% csrf_token %}
            <div class="grid">
                <div><label>Username</label><input type="text" name="username" required></div>
                <div><label>Email</label><input type="email" name="email" required></div>
                <div><label>Full Name</label><input type="text" name="full_name"></div>
                <div><label>Mobile Number</label><input type="tel" name="mobile"></div>
                <div><label>Age</label><input type="number" name="age"></div>
                <div><label>Gender</label><select name="gender"><option>Male</option><option>Female</option><option>Other</option></select></div>
                <div><label>Blood Group</label><select name="blood_group"><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option><option>O+</option><option>O-</option></select></div>
                <div><label>Emergency Contact Name</label><input type="text" name="emergency_name"></div>
                <div><label>Emergency Contact Phone</label><input type="tel" name="emergency_phone"></div>
                <div><label>Relationship</label><input type="text" name="relationship"></div>
                <div><label>GPS Permission</label><select name="gps"><option>Allow</option><option>Deny</option></select></div>
                <div class="full"><label>Address</label><textarea name="address" rows="3"></textarea></div>
                <div><label>Password</label><input type="password" name="password" required></div>
                <div><label>Confirm Password</label><input type="password" name="confirm_password" required></div>
                <div class="full"><label><input type="checkbox" style="width:auto" required> I agree to the Terms & Privacy Policy</label></div>
            </div>
            <button class="btn" type="submit">Create Account</button>
            <div class="small">Already have an account? <a href="{% url 'login' %}">Login</a></div>
            <div class="small"><a href="{% url 'index' %}">Back to Home</a></div>
        </form>
    </div>
</body>
</html>
