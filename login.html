<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>RapidAid AI - Login</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif}
        body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0F9D58,#4285F4)}
        .card{width:380px;background:#fff;padding:35px;border-radius:18px;box-shadow:0 15px 40px rgba(0,0,0,.2)}
        h1{text-align:center;color:#0F9D58;margin-bottom:8px}
        p{text-align:center;color:#666;margin-bottom:25px}
        label{display:block;margin:12px 0 6px;font-weight:600}
        input{width:100%;padding:12px;border:1px solid #ccc;border-radius:10px}
        .row{display:flex;justify-content:space-between;align-items:center;margin:12px 0}
        button{width:100%;padding:13px;border:none;border-radius:10px;background:#0F9D58;color:#fff;font-size:16px;font-weight:bold;cursor:pointer}
        button:hover{background:#0c7e47}
        .google{margin-top:12px;background:#4285F4}
        a{text-decoration:none;color:#4285F4}
        .footer{text-align:center;margin-top:18px;color:#555}
        .logo{text-align:center;font-size:42px}
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🏥</div>
        <h1>RapidAid AI</h1>
        <p>Secure Login</p>
        <form method="post">
            {% csrf_token %}
            <label>Username</label>
            <input type="text" name="username" placeholder="Username" required>
            <label>Password</label>
            <input id="pwd" name="password" type="password" placeholder="Password" required>
            <div class="row">
                <label><input type="checkbox" style="width:auto"> Remember me</label>
                <a href="#">Forgot Password?</a>
            </div>
            <button type="submit">Login</button>
            <button type="button" class="google">Continue with Google</button>
            <div class="footer">Don't have an account? <a href="{% url 'register' %}">Register</a></div>
            <div class="footer"><a href="{% url 'index' %}">Back to Home</a></div>
        </form>
    </div>
</body>
</html>
