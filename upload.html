<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload - RapidAid AI</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    background:#F7FAFC;
    font-family:Arial, sans-serif;
    color:#1F2937;

}



.container{

    width:90%;
    max-width:650px;
    margin:60px auto;

}



.card{

    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.12);

}



h1{

    text-align:center;
    color:#0F9D58;
    margin-bottom:25px;

}



.upload-box{

    border:3px dashed #4285F4;
    border-radius:15px;
    padding:45px;
    text-align:center;
    cursor:pointer;

}



.upload-box:hover{

    background:#f1f7ff;

}



input[type="file"]{

    margin-top:20px;

}



.preview{

    margin-top:20px;
    text-align:center;

}



.preview img{

    width:250px;
    height:250px;
    object-fit:cover;
    border-radius:15px;
    display:none;

}



button{

    width:100%;
    margin-top:25px;
    padding:15px;

    border:none;
    border-radius:10px;

    background:#0F9D58;
    color:white;

    font-size:18px;
    cursor:pointer;

}



button:hover{

    background:#0C874B;

}



#status{

    text-align:center;
    margin-top:20px;
    color:#4285F4;
    font-weight:bold;

}



.note{

    margin-top:20px;
    font-size:13px;
    color:#777;
    text-align:center;

}



</style>


</head>



<body>



<div class="container">


<div class="card">


<h1>
RapidAid AI
</h1>


<h2 style="text-align:center;margin-bottom:20px;">
Upload Medical Image
</h2>



<div class="upload-box">


<p>
Select damaged body image
</p>


<input 
type="file"
id="imageInput"
accept="image/*">


</div>



<div class="preview">

<img id="previewImage">


</div>



<button onclick="analyzeImage()">

Analyze Image

</button>



<p id="status"></p>



<p class="note">

Supported formats: JPG, JPEG, PNG, WEBP.
AI analysis is only an assessment and not a confirmed diagnosis.

</p>



</div>


</div>





<script>


// Render FastAPI Backend URL

const API_URL =
"https://rapidaidai.onrender.com/analyze";



const imageInput =
document.getElementById("imageInput");


const previewImage =
document.getElementById("previewImage");




// Image Preview

imageInput.addEventListener(
"change",
function(){


const file =
this.files[0];


if(file){


previewImage.src =
URL.createObjectURL(file);


previewImage.style.display =
"block";


}


});




// Send Image To Backend

async function analyzeImage(){


const file =
imageInput.files[0];



if(!file){


alert("Please select an image first");

return;


}



const formData =
new FormData();



formData.append(
"file",
file
);



document.getElementById("status").innerHTML =
"⏳ AI is analyzing image...";



try{


const response =
await fetch(
API_URL,
{

method:"POST",

body:formData

}
);





if(!response.ok){


throw new Error(
"Server Error"
);


}





const data =
await response.json();



console.log(data);




// Save Report

localStorage.setItem(
"medicalReport",
JSON.stringify(data)
);





document.getElementById("status").innerHTML =
"✅ Analysis Completed";





// Redirect to Report Page

setTimeout(()=>{


window.location.href =
"analysis.html";


},1000);





}

catch(error){


console.error(error);



document.getElementById("status").innerHTML =
"❌ Backend connection failed";


}



}



</script>



</body>


</html>
